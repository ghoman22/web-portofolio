server {
    listen 80;
    server_name goman.ngenz.org www.goman.ngenz.org;

    # Redirect www to non-www for consistent URLs
    if ($host = www.goman.ngenz.org) {
        return 301 https://goman.ngenz.org$request_uri;
    }

    root /var/www/portfolio;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Remove .html extension from URLs
    location / {
        # Handle homepage
        if ($uri = /index) {
            return 301 /;
        }
        
        # Try files without extension first, then with .html
        try_files $uri $uri.html $uri/ @rewrites;
    }

    # Handle specific page rewrites for SEO-friendly URLs
    location @rewrites {
        # Redirect old URLs to new SEO-friendly URLs
        rewrite ^/blogs\.html$ /blog permanent;
        rewrite ^/index\.html$ / permanent;
        
        # Handle blog post URLs - redirect old format to new
        rewrite ^/blog/ci-cd-pipeline-github-actions\.html$ /blog/ci-cd-pipeline-github-actions permanent;
        rewrite ^/blog/aws-terraform-infrastructure\.html$ /blog/aws-terraform-infrastructure permanent;
        rewrite ^/blog/prometheus-grafana-monitoring\.html$ /blog/prometheus-grafana-monitoring permanent;
        
        # Default 404 for unmatched URLs
        return 404;
    }

    # Specific location blocks for clean URLs
    location = / {
        try_files /index.html =404;
    }

    location = /blog {
        try_files /blogs.html =404;
    }

    location ^~ /blog/ {
        # Handle blog post URLs
        rewrite ^/blog/(.+)$ /blog/$1.html last;
        try_files $uri $uri.html =404;
    }

    # About page redirect
    location = /about {
        return 301 /#about;
    }

    # Skills page redirect  
    location = /skills {
        return 301 /#skills;
    }

    # Contact page redirect
    location = /contact {
        return 301 /#contact;
    }

    # Robots.txt
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nAllow: /\nSitemap: https://goman.ngenz.org/sitemap.xml\n";
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}

