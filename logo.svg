<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#brandGradient)" stroke="#ffffff" stroke-width="8" filter="url(#shadow)"/>
  
  <!-- Code brackets and initials -->
  <g fill="#ffffff" transform="translate(256,256)">
    <!-- Left angle bracket -->
    <path d="M-100,-80 L-140,-40 L-140,40 L-100,80 L-80,60 L-100,40 L-100,-40 L-80,-60 Z" opacity="0.9"/>
    
    <!-- Right angle bracket -->
    <path d="M100,-80 L80,-60 L100,-40 L100,40 L80,60 L100,80 L140,40 L140,-40 Z" opacity="0.9"/>
    
    <!-- Central monogram "FA" -->
    <g font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle">
      <!-- Letter F -->
      <text x="-25" y="20" font-size="120" fill="#ffffff">F</text>
      <!-- Letter A -->
      <text x="25" y="20" font-size="120" fill="#ffffff">A</text>
    </g>
    
    <!-- Subtle tech pattern -->
    <g opacity="0.3" stroke="#ffffff" stroke-width="2" fill="none">
      <circle cx="0" cy="-160" r="8"/>
      <circle cx="140" cy="-80" r="6"/>
      <circle cx="140" cy="80" r="6"/>
      <circle cx="0" cy="160" r="8"/>
      <circle cx="-140" cy="80" r="6"/>
      <circle cx="-140" cy="-80" r="6"/>
      
      <!-- Connecting lines -->
      <line x1="0" y1="-160" x2="140" y2="-80" opacity="0.5"/>
      <line x1="140" y1="-80" x2="140" y2="80" opacity="0.5"/>
      <line x1="140" y1="80" x2="0" y2="160" opacity="0.5"/>
      <line x1="0" y1="160" x2="-140" y2="80" opacity="0.5"/>
      <line x1="-140" y1="80" x2="-140" y2="-80" opacity="0.5"/>
      <line x1="-140" y1="-80" x2="0" y2="-160" opacity="0.5"/>
    </g>
  </g>
</svg>